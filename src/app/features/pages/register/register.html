<div class="auth-container">
  <div class="auth-card">
    <h2>CREAR CUENTA</h2>

    @if (errores.length > 0) {
      <div class="error-alert" role="alert" aria-live="assertive" aria-atomic="true">
        <ul>
          @for (error of errores; track $index) {
            <li>{{ error }}</li>
          }
        </ul>
      </div>
    }

    @if (successMessage) {
      <div class="success-alert" role="status" aria-live="polite">
        {{ successMessage }}
      </div>
    }

    <form (ngSubmit)="register()" novalidate aria-label="Formulario de registro">
      <div class="form-group">
        <label for="username">Nombre de Usuario <span class="required" aria-label="campo requerido">*</span></label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="username"
          placeholder="TuNombreGamer"
          required
          aria-required="true"
          [attr.aria-invalid]="errores.length > 0 ? 'true' : 'false'"
          aria-describedby="username-hint">
        <span id="username-hint" class="field-hint">Tu nombre público en el juego</span>
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico <span class="required" aria-label="campo requerido">*</span></label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="usuario@ejemplo.com"
          required
          aria-required="true"
          [attr.aria-invalid]="errores.length > 0 ? 'true' : 'false'"
          aria-describedby="email-hint">
        <span id="email-hint" class="field-hint">Usarás este correo para iniciar sesión</span>
      </div>

      <div class="form-group">
        <label for="password">Contraseña <span class="required" aria-label="campo requerido">*</span></label>
        <div class="input-password-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            name="password"
            [(ngModel)]="password"
            placeholder="Mínimo 6 caracteres"
            required
            aria-required="true"
            [attr.aria-invalid]="errores.length > 0 ? 'true' : 'false'"
            aria-describedby="password-hint">
          <button
            type="button"
            class="btn-toggle-password"
            (click)="togglePassword()"
            [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <span id="password-hint" class="field-hint">Mínimo 6 caracteres</span>
      </div>

      <button type="submit" class="btn-submit" [disabled]="loading" [attr.aria-busy]="loading">
        @if (loading) {
          <span aria-live="polite">REGISTRANDO...</span>
        } @else {
          REGISTRARSE
        }
      </button>
    </form>

    <div class="switch-auth">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></p>
    </div>
  </div>
</div>
